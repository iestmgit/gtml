<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IESTM Game Studio</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- نوار ابزار بالایی -->
    <div id="toolbar">
        <div class="logo">🎮 IESTM Game Studio</div>
        <div class="actions">
            <button id="newBtn">📄 جدید</button>
            <button id="saveBtn">💾 ذخیره</button>
            <button id="loadBtn">📂 بارگذاری</button>
            <button id="exportBtn">🚀 خروجی HTML</button>
            <button id="playBtn">▶️ اجرا</button>
        </div>
    </div>

    <!-- پنل ابزار (سمت راست) -->
    <div id="toolsPanel">
        <h4>🔧 ابزارها</h4>
        <div class="tool-item" data-type="rect">⬛ مستطیل</div>
        <div class="tool-item" data-type="circle">⚪ دایره</div>
        <div class="tool-item" data-type="text">🔤 متن</div>
        <div class="tool-item" data-type="image">🖼️ تصویر</div>
        <div class="tool-item" data-type="button">🔘 دکمه</div>
        <hr />
        <h4>⚙️ تنظیمات</h4>
        <div id="propertiesPanel">
            <label>X: <input type="number" id="propX" value="0" /></label>
            <label>Y: <input type="number" id="propY" value="0" /></label>
            <label>عرض: <input type="number" id="propW" value="100" /></label>
            <label>ارتفاع: <input type="number" id="propH" value="100" /></label>
            <label>رنگ: <input type="color" id="propColor" value="#6c5ce7" /></label>
            <label>متن: <input type="text" id="propText" value="متن" /></label>
            <button id="deleteBtn">🗑️ حذف</button>
        </div>
    </div>

    <!-- محیط کار (صحنه) -->
    <div id="sceneContainer">
        <div id="scene">
            <!-- المان‌های بازی اینجا قرار می‌گیرند -->
        </div>
        <div id="dropZone">📥 المان‌ها را اینجا بکشید</div>
    </div>

    <!-- پنل پایین (لاگ یا اطلاعات) -->
    <div id="footer">
        <span id="status">✅ آماده</span>
        <span id="objectCount">اشیاء: ۰</span>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
